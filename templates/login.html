<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login — CyberScan Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head><body>
<canvas id="particles" class="particles-canvas"></canvas>
<div class="grid-overlay"></div>
<nav class="topnav">
  <div class="nav-logo">[⬡ CYBERSCAN<span class="logo-pro">PRO</span>]</div>
  <div class="nav-right">
    <div class="nav-links">
      <a href="{{ url_for('index') }}" class="nav-link">← Home</a>
      <a href="{{ url_for('register') }}" class="nav-link btn-primary">Register</a>
    </div>
    <div class="nav-status"><span class="status-dot"></span><span class="status-text">ONLINE</span></div>
  </div>
</nav>
{% with messages = get_flashed_messages(with_categories=true) %}{% if messages %}<div class="flash-container">{% for c,m in messages %}<div class="flash flash-{{ c }}">{{ m }}</div>{% endfor %}</div>{% endif %}{% endwith %}
<div class="auth-section">
  <div class="auth-box">
    <div class="auth-title">ACCESS PORTAL</div>
    <div class="auth-sub">AUTHENTICATE TO CONTINUE</div>
    <form method="POST">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="form-group"><label class="form-label">USERNAME OR EMAIL</label><input class="form-input" name="identifier" required placeholder="your@email.com" autocomplete="username"></div>
      <div class="form-group"><label class="form-label">PASSWORD</label><input class="form-input" name="password" type="password" required placeholder="••••••••" autocomplete="current-password"></div>
      <div class="form-check"><input type="checkbox" name="remember" id="rem"><label for="rem">Keep me logged in</label></div>
      <button type="submit" class="auth-btn">LOGIN →</button>
    </form>
    <div class="auth-switch">No account? <a href="{{ url_for('register') }}">Register here</a></div>
  </div>
</div>
{% include '_footer.html' %}
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body></html>
